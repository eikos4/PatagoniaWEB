{# Pad de firma manuscrita + geolocalización opcional #}
<div class="signature-pad-block">
  <label class="block text-[11px] font-bold uppercase tracking-wider text-ink-muted mb-2">
    <i class="fas fa-signature text-patagonia mr-1"></i> Firma manuscrita *
  </label>
  <div class="rounded-2xl border-2 border-dashed border-gray-200 bg-white overflow-hidden">
    <canvas id="signatureCanvas" class="w-full touch-none cursor-crosshair" width="600" height="200" style="max-width:100%;height:200px;"></canvas>
  </div>
  <div class="flex flex-wrap gap-2 mt-2">
    <button type="button" id="signatureClear" class="text-xs font-bold text-ink-muted hover:text-red-600 px-3 py-1.5 rounded-lg border border-gray-200 hover:border-red-200 transition-colors">
      <i class="fas fa-eraser mr-1"></i> Borrar firma
    </button>
    <span id="geoStatus" class="text-xs text-ink-muted flex items-center gap-1 px-2 py-1.5">
      <i class="fas fa-location-dot"></i> <span>Obteniendo ubicación…</span>
    </span>
  </div>
  <input type="hidden" name="signature_data" id="signatureData" value="">
  <input type="hidden" name="latitude" id="signatureLat" value="">
  <input type="hidden" name="longitude" id="signatureLng" value="">
  <input type="hidden" name="location_label" id="signatureLocation" value="">
</div>

<script>
(function initSignaturePad() {
  const canvas = document.getElementById('signatureCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const hidden = document.getElementById('signatureData');
  const latIn = document.getElementById('signatureLat');
  const lngIn = document.getElementById('signatureLng');
  const locIn = document.getElementById('signatureLocation');
  const geoStatus = document.getElementById('geoStatus');
  let drawing = false;
  let hasStroke = false;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * ratio);
    canvas.height = Math.floor(200 * ratio);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = '200px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#111111';
  }
  resize();
  window.addEventListener('resize', resize);

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  function start(e) { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }
  function move(e) {
    if (!drawing) return;
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    hasStroke = true;
    e.preventDefault();
  }
  function end() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);

  document.getElementById('signatureClear')?.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasStroke = false;
    hidden.value = '';
  });

  const form = canvas.closest('form');
  form?.addEventListener('submit', (e) => {
    if (!hasStroke) {
      e.preventDefault();
      alert('Debes dibujar tu firma antes de continuar.');
      return;
    }
    hidden.value = canvas.toDataURL('image/png');
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        latIn.value = pos.coords.latitude;
        lngIn.value = pos.coords.longitude;
        if (geoStatus) geoStatus.innerHTML = '<i class="fas fa-circle-check text-green-600"></i> <span>Ubicación registrada (GPS)</span>';
      },
      () => {
        if (geoStatus) geoStatus.innerHTML = '<i class="fas fa-location-crosshairs text-ink-muted"></i> <span>Ubicación no disponible (se usará IP)</span>';
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  } else if (geoStatus) {
    geoStatus.innerHTML = '<i class="fas fa-location-crosshairs text-ink-muted"></i> <span>GPS no soportado en este navegador</span>';
  }
})();
</script>
