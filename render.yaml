services:
  - type: web
    name: patagonia-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: FLASK_APP
        value: run:app
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: patagonia-db
          property: connectionString

databases:
  - name: patagonia-db
    plan: free
    databaseName: patagonia
    user: patagonia
